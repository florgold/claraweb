<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Producción Cultural</title>
    <!-- Importamos Geist Mono e Instrument Serif por si usás el título general -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/font/mono.min.css">
    <link rel="stylesheet" href="style-produccion.css">
</head>
<body>

    <!-- Flecha Volver Atrás (Mismo comportamiento absolute) -->
    <a href="index.html" class="back-button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </a>

    <main class="cv-container">
        
        <h1 class="page-title">Producción Cultural</h1>

        <!-- Contenedor del Fichero de Carpetas -->
        <div class="fichero-container">

            <!-- CARPETA 1: Producción Audiovisual -->
            <div class="folder-wrapper folder-audiovisual">
                <button class="folder-tab" onclick="toggleFolder(this)">
                    Producción<br>Audiovisual
                </button>
                <div class="folder-content">
                    <div class="inner-content">
                        <h3>Proyectos Audiovisuales</h3>
                        <p>lista de cortos largos etc. con las img de las teles</p>
                    </div>
                </div>
            </div>

            <!-- CARPETA 2: Gestión Cultural -->
            <div class="folder-wrapper folder-gestion">
                <button class="folder-tab" onclick="toggleFolder(this)">
                    Gestión<br>Cultural
                </button>
                <div class="folder-content">
                    <div class="inner-content">
                        <h3>Gestión Cultural</h3>
                        <p>culturas gestionadas</p>
                    </div>
                </div>
            </div>

            <!-- CARPETA 3: Producción Musical -->
            <div class="folder-wrapper folder-musical">
                <button class="folder-tab" onclick="toggleFolder(this)">
                    Producción<br>Musical
                </button>
                <div class="folder-content">
                    <div class="inner-content">
                        <h3>Producción Musical</h3>
                        <p>musica</p>
                    </div>
                </div>
            </div>

            <!-- CARPETA 4: Escritura -->
            <div class="folder-wrapper folder-escritura">
                <button class="folder-tab" onclick="toggleFolder(this)">
                    Escritura
                </button>
                <div class="folder-content">
                    <div class="inner-content">
                        <h3>Escritura</h3>
                        <p>mucho texto</p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Script minimalista para la animación de apertura -->
    <script>
        function toggleFolder(tabButton) {
            const folderWrapper = tabButton.parentElement;
            
            // Alterna la clase active para abrir/cerrar
            folderWrapper.classList.toggle('active');
            
            // Opcional: si querés que al abrir una se cierren las demás automáticamente,
            // desenterrá las siguientes líneas de código:
            /*
            document.querySelectorAll('.folder-wrapper').forEach(wrapper => {
                if (wrapper !== folderWrapper) wrapper.classList.remove('active');
            });
            */
        }
    </script>
</body>
</html>
